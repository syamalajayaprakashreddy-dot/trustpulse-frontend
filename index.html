  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://accounts.google.com/gsi/client" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-bg: #E6F5EF;
      --green-mid: rgba(29,158,117,0.18);
      --bg: #F8F7F5;
      --card: #FFFFFF;
      --surface: #F0EEE9;
      --surface2: #E8E6E0;
      --border: rgba(24,24,26,0.07);
      --border-md: rgba(24,24,26,0.13);
      --text: #18181A;
      --text-2: #5A5A60;
      --text-3: #9B9BA0;
      --warn: #EF9F27;
      --warn-bg: #FEF3E2;
      --warn-text: #7A4A00;
      --red: #E24B4A;
      --red-bg: #FEE8E8;
      --red-text: #9A2B2A;
      --r: 12px;
      --r-sm: 8px;
      --r-lg: 16px;
      --r-xl: 20px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 6px 24px rgba(0,0,0,0.11), 0 2px 6px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.07);
      --green-glow: rgba(29,158,117,0.35);
      --green-bright: #5DCEA4;
      --hero-bg: #091a10;
    }
    html { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    * { -webkit-tap-highlight-color: transparent; }
    input, button, textarea, select { font-family: inherit; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes drawRing { from { stroke-dashoffset: 999; } }
    .fade-up { animation: fadeUp 0.35s ease-out forwards; }
    .fade-in { animation: fadeIn 0.25s ease-out forwards; }
    @keyframes glow { 0%,100%{opacity:.7} 50%{opacity:1} }
    .card-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-lift:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .dark-input::placeholder { color: rgba(255,255,255,0.3); }
    .dark-input { color: #fff !important; }
    #cookie-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #18181A; color: #fff;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      z-index: 999; font-size: 12px; line-height: 1.4;
    }
    #cookie-banner a { color: var(--green); }
    #cookie-btn {
      background: var(--green); color: #fff; border: none;
      border-radius: 7px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; font-family: inherit;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
  @media (max-width: 600px) {
    body { font-size: 14px; }
    h1 { font-size: 18px !important; }
    input { font-size: 16px !important; }
    .nav-page-links { display: none !important; } @media(min-width:769px){.nav-page-links{display:flex!important;}} .hamburger-btn{display:flex!important;} @media(min-width:600px){.hamburger-btn{display:none!important;}}
    nav { overflow: visible !important; min-width: 0; }
    nav > button { flex-shrink: 0 !important; }
    nav > div { flex-shrink: 0 !important; }
  }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="cookie-banner">
    <p>We use cookies to improve your experience. See our <a href="#">cookie policy</a>.</p>
    <button id="cookie-btn" onclick="document.getElementById('cookie-banner').style.display='none'; localStorage.setItem('tp_cookies','1')">Accept</button>

function AIFixRecommendations({ issues, checks, url, score, proCode }) {
  const [fixes, setFixes] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  async function getFixes() {
    setLoading(true);
    const failed = (checks||[]).filter(c=>c.status==='fail').map(c=>c.label);
    const warnings = (checks||[]).filter(c=>c.status==='warn').map(c=>c.label);
    const issueList = (issues||[]).map(i=>i.description||i.text||JSON.stringify(i));
    const prompt = `You are a trust and compliance expert. A website (${url}) scored ${score}/100. 
Failed checks: ${failed.join(', ')||'none'}. 
Warnings: ${warnings.join(', ')||'none'}.
Issues: ${issueList.slice(0,5).join('; ')||'none'}.
Give 3-5 specific, actionable fix recommendations. Each fix should be 1-2 sentences. Format as JSON array: [{"issue":"...","fix":"...","priority":"high|medium|low"}]
Return ONLY the JSON array, nothing else.`;

    try {
      const res = await fetch('https://web-production-b87c1.up.railway.app/api/ai-fix/', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ prompt: prompt, code: proCode || localStorage.getItem('tp_access_code') || '' })
      });
      const data = await res.json();
      const text = data.content[0].text;
      const clean = text.replace(/```json|```/g,'').trim();
      setFixes(JSON.parse(clean));
    } catch(e) {
      setFixes([{issue:'Error',fix:'Could not load recommendations. Please try again.',priority:'low'}]);
    }
    setLoading(false);
  }

  const priorityColor = p => p==='high'?'var(--red)':p==='medium'?'var(--warn)':'var(--green)';

  if (!fixes && !loading) return React.createElement('button', {
    onClick: getFixes,
    style:{ background:'linear-gradient(135deg,var(--green),#0d7a5f)', color:'#fff', border:'none', borderRadius:8, padding:'8px 18px', fontSize:13, fontWeight:600, cursor:'pointer', width:'100%' }
  }, '✨ Get AI Fix Recommendations');

  if (loading) return React.createElement('div', { style:{textAlign:'center',padding:'1rem',color:'var(--green)',fontSize:13} }, '🤖 Analysing your site...');

  return React.createElement('div', { style:{display:'flex',flexDirection:'column',gap:10} },
    fixes.map((f,i) => React.createElement('div', {
      key:i,
      style:{ background:'var(--bg)', borderRadius:8, padding:'10px 12px', borderLeft:`3px solid ${priorityColor(f.priority)}` }
    },
      React.createElement('div', { style:{display:'flex',alignItems:'center',gap:8,marginBottom:4} },
        React.createElement('span', { style:{fontSize:11,fontWeight:700,color:priorityColor(f.priority),textTransform:'uppercase',letterSpacing:1} }, f.priority),
        React.createElement('span', { style:{fontSize:13,fontWeight:600,color:'var(--text)'} }, f.issue)
      ),
      React.createElement('p', { style:{fontSize:12,color:'var(--text-2)',margin:0,lineHeight:1.5} }, f.fix)
    ))
  );
}

// ─── Scan History Panel ────────────────────────────────────────────────────────
// ✅ FIX 4: Scan history per user — reads from /api/scans/ endpoint
function ScanHistoryPanel({ authUser, onScan, onNavigate }) {
  const [history, setHistory] = useAppState([]);
  const [loading, setLoading] = useAppState(true);

  useAppEffect(() => { if (authUser) loadHistory(); }, [authUser]);

  async function loadHistory() {
    setLoading(true);
    try {
      const token = localStorage.getItem('tp_token');
      const r = await fetch('https://web-production-b87c1.up.railway.app/api/scans/', {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (r.ok) {
        const d = await r.json();
        setHistory(Array.isArray(d) ? d : (d.scans || d.results || []));
      }
    } catch { /* silent */ }
    setLoading(false);
  }

  if (!authUser) return null;

  return (
    <Card style={{ marginBottom: '1rem' }}>
      <div style={{ padding: '1rem 1rem 0.5rem', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize: 13, fontWeight: 700 }}>📋 Your scan history</div>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={loadHistory} style={{ background:'none', border:'none', color:'var(--green)', fontSize:11, cursor:'pointer', fontWeight:600 }}>↻ Refresh</button>
          <button onClick={async () => { if(!confirm('Clear all scan history?')) return; const token = localStorage.getItem('tp_token'); const r = await fetch('https://web-production-b87c1.up.railway.app/api/scans/', {headers:{'Authorization':'Bearer '+token}}); const d = await r.json(); await Promise.all((d.scans||[]).map(s => fetch('https://web-production-b87c1.up.railway.app/api/scans/delete/', {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({id:s.id})}))); loadHistory(); }} style={{ background:'none', border:'none', color:'var(--red)', fontSize:11, cursor:'pointer', fontWeight:600 }}>🗑 Clear</button>
        </div>
      </div>
      <div style={{ padding: '0 1rem 1rem' }}>
        {loading ? (
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {[1,2,3].map(i => (
              <div key={i} style={{ height:52, borderRadius:'var(--r-sm)', background:'linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite' }} />
            ))}
            <style>{`@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }`}</style>
          </div>
        ) : history.length === 0 ? (
          <div style={{ textAlign:'center', padding:'0.75rem 0', color:'var(--text-3)', fontSize:12 }}>No scans yet. Run your first scan above!</div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {history.slice(0, 5).map((s, i) => (
              <div key={i} onClick={() => { onScan(s.url || s.brand_url); onNavigate('scanner'); }} style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'9px 12px', background:'var(--surface)', borderRadius:'var(--r-sm)',
                cursor:'pointer', transition:'background 0.1s',
              }}
                onMouseEnter={e => e.currentTarget.style.background='var(--surface2)'}
                onMouseLeave={e => e.currentTarget.style.background='var(--surface)'}
              >
                <div>
                  <div style={{ fontSize:12, fontWeight:600 }}>{s.url || s.brand_url}</div>
                  <div style={{ fontSize:10, color:'var(--text-3)', marginTop:2 }}>
                    {s.timestamp ? new Date(s.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'Recent'}
                  </div>
                </div>
                {s.score != null && (
                  <div style={{ padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:700, background: s.score>=75?'var(--green-bg)':s.score>=50?'var(--warn-bg)':'var(--red-bg)', color: s.score>=75?'var(--green-dark)':s.score>=50?'var(--warn-text)':'var(--red-text)', flexShrink:0 }}>{s.score}</div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </Card>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useAppState('landing');
  const [isPro, setIsPro] = useAppState(() => localStorage.getItem('tp_pro') === 'true');
  const [scanUrl, setScanUrl] = useAppState('');
  const [tweaks, setTweakState] = useAppState(TWEAK_DEFAULTS);
  const [authUser, setAuthUser] = useAppState(() => {
    try { return JSON.parse(localStorage.getItem('tp_user') || 'null'); } catch { return null; }
  });
  const [showUserMenu, setShowUserMenu] = React.useState(false);
  const [showProfile, setShowProfile] = React.useState(false);
  
// Global 401 handler
const fetchWithAuth = async (url, options={}) => {
  const token = localStorage.getItem('tp_token');
  if (token) {
    options.headers = { ...options.headers, 'Authorization': 'Bearer ' + token };
  }
  const res = await fetch(url, options);
  if (res.status === 401) {
    localStorage.removeItem('tp_token');
    localStorage.removeItem('tp_user');
    window.location.hash = '#login';
    onNavigate('login');
  }
  return res;
};

const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
  // Auth modal — only shown when user clicks something
  const [showAuth, setShowAuth] = useAppState(false);
  const [toast, setToast] = useAppState(null); // { msg, type }
  const [tweaksOpen, setTweaksOpen] = useAppState(false);
  const [exitShown, setExitShown] = useAppState(false);
  const [showExit, setShowExit] = useAppState(false);

  // Show toast for 3 seconds
  function showToast(msg, type = 'success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  // Gate: if not logged in, show auth modal and return false
  function requireAuth() {
    if (!authUser) { setShowAuth(true); return false; }
    return true;
  }

  useAppEffect(() => { applyTheme(tweaks.theme); }, [tweaks.theme]);
  useAppEffect(() => { applyDensity(tweaks.density); }, [tweaks.density]);
  useAppEffect(() => { if (tweaks.showPro && !isPro) setIsPro(true); }, [tweaks.showPro]);
  useAppEffect(() => {
    if (exitShown || page !== 'landing') return;
    const h = (e) => { if (e.clientY < 10) { setShowExit(true); setExitShown(true); } };
    document.addEventListener('mouseleave', h);
    return () => document.removeEventListener('mouseleave', h);
  }, [exitShown, page]);
  useAppEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function setTweak(key, val) {
    const next = typeof key === 'object' ? { ...tweaks, ...key } : { ...tweaks, [key]: val };
    setTweakState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  }
  // navigate: landing is always free, everything else requires auth
  function navigate(target) {
    if (target !== 'landing' && !authUser) { setShowAuth(true); return; }
    setPage(target); window.scrollTo({ top:0, behavior:'smooth' });
  }
  async function saveScan(url) {
    const token = localStorage.getItem('tp_token');
    if (!token) return;
    try {
      await fetch('https://web-production-b87c1.up.railway.app/api/scans/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ url, brand_url: url }),
      });
    } catch { /* silent */ }
  }
  function handleScan(url) {
    if (!requireAuth()) return;
    setScanUrl(url);
    setPage('scanner');
    saveScan(url);
  }
  function unlockPro() { setIsPro(true); localStorage.setItem('tp_pro','true'); }

        backdropFilter:'blur(20px) saturate(180%)', WebkitBackdropFilter:'blur(20px) saturate(180%)',
        position:'sticky', top:0, zIndex:50, boxShadow:'0 1px 0 rgba(0,0,0,0.04)',
      }}>
        <button onClick={() => navigate('landing')} style={{ display:'flex', alignItems:'center', gap:8, background:'none', border:'none', cursor:'pointer', padding:0, color:'var(--text)' }}>
          <div style={{ width:30, height:30, background:'linear-gradient(135deg,#1D9E75,#22B88A)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:12, fontWeight:800, boxShadow:'0 2px 8px rgba(29,158,117,0.35)' }}>TP</div>
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:'-0.3px' }}>TrustPulse</span>
        </button>
        <div className="nav-page-links" style={{ display:'flex', gap:4, alignItems:'center', overflow:'hidden', flex:1, justifyContent:'center' }}>

            }}>{label}</button>

                { icon:'🔍', label:'New Scan', pg:'scanner' },
                { icon:'📄', label:'My Reports', pg:'dashboard' },
                { icon:'⚙️', label:'Settings', pg:'profile' },
              ].map(item => (
                <button
                  key={item.label}
                  onClick={() => { if(item.pg==='profile'){ setShowProfile(true); setShowUserMenu(false); } else { navigate(item.pg); setShowUserMenu(false); } }}
                  style={{
                    display:'flex', alignItems:'center', gap:10,
                    width:'100%', padding:'10px 16px',
                    border:'none', borderBottom:'1px solid var(--border)',
                    background:'transparent', cursor:'pointer',
                    fontSize:13, color:'var(--text)', textAlign:'left'
                  }}>
                  <span>{item.icon}</span>
                  <span>{item.label}</span>
                </button>
              ))}
              {!isPro && (
                <button
                  onClick={() => { navigate('pricing'); setShowUserMenu(false); }}
                  style={{
                    display:'flex', alignItems:'center', gap:10,
                    width:'100%', padding:'10px 16px',
                    border:'none', borderBottom:'1px solid var(--border)',
                    background:'linear-gradient(135deg,#1D9E75,#22B88A)',
                    cursor:'pointer', fontSize:13,
                    color:'#fff', textAlign:'left'
                  }}>
                  <span>👑</span>
                  <span>Upgrade to Pro</span>
                </button>
              )}
              <button
                onClick={() => { localStorage.clear(); window.location.href = '/'; }}
                style={{
                  display:'flex', alignItems:'center', gap:10,
                  width:'100%', padding:'10px 16px',
                  border:'none', background:'transparent',
                  cursor:'pointer', fontSize:13,
                  color:'#e53e3e', textAlign:'left'
                }}>
                <span>🚪</span>
                <span>Sign out</span>
              </button>
            </div>
          )}
        </div>
        </div>
      </nav>

      {mobileMenuOpen && (
        <div style={{ position:'fixed', top:49, left:0, right:0, background:'var(--card)', borderBottom:'1px solid var(--border)', zIndex:99, padding:'8px 12px', display:'flex', flexDirection:'column', gap:4 }}>
          {[['scanner','Scan'],['dashboard','Dashboard'],['competitor','Compare'],['blog','Resources'],['about','About'],['pricing','Pricing']].map(([pg,label]) => (
            <button key={pg} onClick={() => { navigate(pg); setMobileMenuOpen(false); }} style={{ background: page===pg?'var(--green-bg)':'transparent', color: page===pg?'var(--green)':'var(--text)', border:'none', borderRadius:8, padding:'10px 12px', fontSize:13, fontWeight:page===pg?600:500, cursor:'pointer', textAlign:'left' }}>{label}</button>
          ))}
        </div>
      )}
      <main style={{ flex:1 }}>
        {page==='landing'    && <LandingPage    onNavigate={navigate} onScan={handleScan} requireAuth={requireAuth} />}
        {page==='scanner'    && (
          <div>
            <ScannerPage initialUrl={scanUrl} isPro={isPro||tweaks.showPro} onUnlockPro={unlockPro} />
            {authUser && (
              <div style={{ padding:'0 1rem 1.5rem', maxWidth:540, margin:'0 auto' }}>
                <ScanHistoryPanel authUser={authUser} onScan={handleScan} onNavigate={navigate} />
              </div>
            )}
          </div>
        )}
        {page==='dashboard'  && <DashboardPage  onNavigate={navigate} />}
        {page==='competitor' && <CompetitorPage />}
        {page==='pricing'    && <PricingPage    onNavigate={navigate} />}
        {page==='about'      && <AboutPage      onNavigate={navigate} />}
        {page==='blog'       && <BlogPage       onNavigate={navigate} />}
      </main>

      <StickyCTA onNavigate={navigate} page={page} />

      {showExit && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.72)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:'1rem' }} onClick={() => setShowExit(false)}>
          <div style={{ background:'var(--card)', borderRadius:'var(--r-xl)', padding:'2rem 1.5rem', maxWidth:340, width:'100%', textAlign:'center', boxShadow:'var(--shadow-lg)', animation:'fadeUp 0.3s ease-out' }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:36, marginBottom:12 }}>⚠️</div>
            <h3 style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Your scan results are ready</h3>
            <p style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.55, marginBottom:'1.25rem' }}>Don't leave without your free trust score. It takes 5 seconds.</p>
            <button onClick={() => { setShowExit(false); navigate('scanner'); }} style={{ width:'100%', padding:'13px', background:'linear-gradient(135deg,#1D9E75,#26C48F)', color:'#fff', border:'none', borderRadius:'var(--r-sm)', fontSize:14, fontWeight:800, cursor:'pointer', marginBottom:10 }}>Scan my site free →</button>
            <button onClick={() => setShowExit(false)} style={{ background:'none', border:'none', color:'var(--text-3)', fontSize:12, cursor:'pointer' }}>No thanks, I'll take the risk</button>
          </div>
        </div>
      )}

      {/* ✅ Toast notification */}
      {toast && (
        <div style={{
          position: 'fixed', top: 20, left: '50%', transform: 'translateX(-50%)',
          zIndex: 99999, animation: 'fadeUp 0.3s ease-out',
          background: toast.type === 'success' ? '#1D9E75' : '#E24B4A',
          color: 'white', padding: '12px 24px', borderRadius: 12,
          fontSize: 14, fontWeight: 600, boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
          display: 'flex', alignItems: 'center', gap: 8, whiteSpace: 'nowrap',
        }}>
          {toast.type === 'success' ? '✓' : '✕'} {toast.msg}
        </div>
      )}

      {/* ✅ Single clean auth modal */}
      {showAuth && (
        <AuthModal
          authUser={authUser}
          setAuthUser={setAuthUser}
          setShowAuth={setShowAuth}
          navigate={navigate}
          onSuccess={(user) => {
            showToast(`Welcome, ${user.name || user.email.split('@')[0]}! 👋`);
          }}
        />
      )}

      {tweaksOpen && (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Brand colour" />
          <TweakColor label="Theme"
            value={tweaks.theme==='green'?'#1D9E75':tweaks.theme==='indigo'?'#4F6EF7':'#D97706'}
            options={['#1D9E75','#4F6EF7','#D97706']}
            onChange={v => setTweak('theme', v==='#4F6EF7'?'indigo':v==='#D97706'?'amber':'green')} />
          <TweakSection label="Layout" />
          <TweakRadio label="Density" value={tweaks.density} options={['compact','comfortable','spacious']} onChange={v => setTweak('density', v)} />
          <TweakSection label="Preview" />
          <TweakToggle label="Show Pro mode" value={tweaks.showPro} onChange={v => setTweak('showPro', v)} />
          <TweakSection label="Demo score" />
          <TweakSlider label="Score" value={tweaks.demoScore} min={0} max={100} step={1} onChange={v => setTweak('demoScore', v)} />
        </TweaksPanel>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
