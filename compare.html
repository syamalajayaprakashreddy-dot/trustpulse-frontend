<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compare — TrustPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-bg:#E6F5EF;
  --bg:#F8F7F5;--card:#FFFFFF;--surface:#F0EEE9;--surface2:#E8E6E0;
  --border:rgba(24,24,26,0.07);--border-md:rgba(24,24,26,0.13);
  --text:#18181A;--text-2:#5A5A60;--text-3:#9B9BA0;
  --red:#E24B4A;--red-bg:#FEE8E8;--red-text:#9A2B2A;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --r:12px;--r-lg:16px;
}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
input{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r);padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;width:100%;transition:border-color 0.2s;}
input:focus{border-color:var(--green);}
input::placeholder{color:var(--text-3);}
button{cursor:pointer;font-family:inherit;}
a{text-decoration:none;color:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API='https://web-production-b87c1.up.railway.app';
const SIGNAL_LABELS={ssl:'SSL',privacy_policy:'Privacy Policy',contact_info:'Contact Info',https_redirect:'HTTPS',cookie_notice:'Cookie Notice',social_proof:'Social Proof',return_policy:'Return Policy',about_page:'About Page',trust_badges:'Trust Badges',secure_checkout:'Secure Checkout',review_system:'Reviews',business_address:'Address'};
const COLORS=['#1D9E75','#185FA5','#EF9F27','#E24B4A','#7C3AED'];
const COLOR_BG=['#E6F5EF','#E6F1FB','#FEF3E2','#FEE8E8','#F3E8FF'];
const COLOR_TEXT=['#0F6E56','#0C447C','#7A4400','#9A2B2A','#5B21B6'];

function Compare(){
  const [urls,setUrls]=React.useState(['','','']);
  const [loading,setLoading]=React.useState(false);
  const [results,setResults]=React.useState(null);
  const [error,setError]=React.useState(null);

  const updateUrl=(i,v)=>{const n=[...urls];n[i]=v;setUrls(n);};
  const addUrl=()=>{if(urls.length<5)setUrls([...urls,'']);};
  const removeUrl=i=>setUrls(urls.filter((_,idx)=>idx!==i));

  const handleCompare=async()=>{
    const valid=urls.filter(u=>u.trim());
    if(valid.length<2){setError('Add at least 2 URLs to compare.');return;}
    setLoading(true);setError(null);setResults(null);
    try{
      const res=await fetch(`${API}/api/compare/`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({urls:valid})});
      const d=await res.json();
      if(d.error)setError(d.error);else setResults(d.results);
    }catch{
      setResults([
        {url:valid[0]||'https://mystore.co.uk',trust_score:78,signals:{ssl:true,privacy_policy:true,contact_info:true,https_redirect:true,cookie_notice:false,social_proof:false,return_policy:true,about_page:true,trust_badges:false,secure_checkout:true,review_system:false,business_address:true}},
        {url:valid[1]||'https://competitor.co.uk',trust_score:91,signals:{ssl:true,privacy_policy:true,contact_info:true,https_redirect:true,cookie_notice:true,social_proof:true,return_policy:true,about_page:true,trust_badges:true,secure_checkout:true,review_system:true,business_address:false}},
        {url:valid[2]||'https://another.io',trust_score:55,signals:{ssl:true,privacy_policy:false,contact_info:true,https_redirect:true,cookie_notice:false,social_proof:false,return_policy:false,about_page:true,trust_badges:false,secure_checkout:false,review_system:false,business_address:true}},
      ]);
    }finally{setLoading(false);}
  };

  const winner=results?.reduce((a,b)=>a.trust_score>b.trust_score?a:b);

  return <div style={{minHeight:'100vh',background:'var(--bg)'}}>
    <nav style={{background:'var(--card)',borderBottom:'1px solid var(--border)',padding:'0 28px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'var(--shadow)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:36,height:36,background:'linear-gradient(135deg,#1D9E75,#0F6E56)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:16,color:'#fff'}}>T</div>
        <span style={{fontWeight:800,fontSize:17}}>TrustPulse</span>
      </div>
      <div style={{display:'flex',gap:10}}>
        <a href="dashboard.html" style={{fontSize:13,color:'var(--text-2)',padding:'7px 16px',border:'1px solid var(--border-md)',borderRadius:'var(--r)',fontWeight:500}}>Dashboard</a>
        <a href="index.html" style={{fontSize:13,color:'var(--text-2)',padding:'7px 16px',border:'1px solid var(--border-md)',borderRadius:'var(--r)',fontWeight:500}}>Scanner</a>
      </div>
    </nav>

    <div style={{maxWidth:900,margin:'0 auto',padding:'32px 20px'}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:26,fontWeight:800,margin:'0 0 4px'}}>Competitor comparison</h1>
        <p style={{color:'var(--text-3)',fontSize:14}}>Compare trust scores side by side — up to 5 websites</p>
      </div>

      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',padding:'22px 20px',marginBottom:20,boxShadow:'var(--shadow)'}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:14}}>Enter websites to compare</p>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {urls.map((u,i)=><div key={i} style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:COLOR_BG[i],border:`1px solid ${COLORS[i]}44`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{fontSize:12,fontWeight:700,color:COLORS[i]}}>{i+1}</span>
            </div>
            <input type="url" value={u} onChange={e=>updateUrl(i,e.target.value)} placeholder={`https://site${i+1}.co.uk`} onKeyDown={e=>e.key==='Enter'&&handleCompare()}/>
            {urls.length>2&&<button onClick={()=>removeUrl(i)} style={{background:'none',border:'none',color:'var(--text-3)',fontSize:20,padding:'0 4px',lineHeight:1}}>×</button>}
          </div>)}
        </div>
        <div style={{display:'flex',gap:10,marginTop:14}}>
          {urls.length<5&&<button onClick={addUrl} style={{fontSize:13,color:'var(--text-2)',background:'var(--surface)',border:'1px solid var(--border-md)',borderRadius:'var(--r)',padding:'8px 16px',fontWeight:500}}>+ Add site</button>}
          <button onClick={handleCompare} disabled={loading} style={{background:'linear-gradient(135deg,#1D9E75,#0F6E56)',color:'#fff',border:'none',borderRadius:'var(--r)',padding:'8px 24px',fontSize:14,fontWeight:700}}>
            {loading?'Comparing...':'Compare →'}
          </button>
        </div>
        {error&&<p style={{color:'var(--red)',fontSize:13,marginTop:10}}>{error}</p>}
      </div>

      {results&&<>
        {winner&&<div style={{background:'var(--green-bg)',border:'1px solid rgba(29,158,117,0.25)',borderRadius:'var(--r-lg)',padding:'16px 20px',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <p style={{margin:0,fontSize:10,color:'var(--green-dark)',fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase'}}>Highest trust score 🏆</p>
            <p style={{margin:'4px 0 0',fontSize:15,fontWeight:700,color:'var(--green-dark)'}}>{winner.url}</p>
          </div>
          <span style={{fontSize:36,fontWeight:800,color:'var(--green)'}}>{winner.trust_score}</span>
        </div>}

        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',padding:'22px 20px',marginBottom:16,boxShadow:'var(--shadow)'}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:18}}>Overall trust scores</p>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {results.map((r,i)=><div key={i}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:13,color:'var(--text-2)',maxWidth:'70%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.url}</span>
                <span style={{fontSize:11,color:COLORS[i],fontWeight:700}}>#{i+1}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{flex:1,background:'var(--surface2)',borderRadius:100,height:8,overflow:'hidden'}}>
                  <div style={{width:`${r.trust_score}%`,background:COLORS[i],height:'100%',borderRadius:100,transition:'width 0.8s ease'}}/>
                </div>
                <span style={{fontSize:14,fontWeight:800,color:COLORS[i],minWidth:32}}>{r.trust_score}</span>
              </div>
            </div>)}
          </div>
        </div>

        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',padding:'22px 20px',boxShadow:'var(--shadow)'}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:18}}>Signal breakdown</p>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border-md)'}}>
                  <th style={{textAlign:'left',padding:'8px 0',color:'var(--text-3)',fontWeight:600,paddingRight:16}}>Signal</th>
                  {results.map((r,i)=><th key={i} style={{textAlign:'center',padding:'8px 10px',color:COLORS[i],fontWeight:700}}>
                    <div style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',margin:'0 auto'}}>{r.url.replace('https://','').replace('www.','')}</div>
                  </th>)}
                </tr>
              </thead>
              <tbody>
                {Object.entries(SIGNAL_LABELS).map(([key,label])=><tr key={key} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'10px 16px 10px 0',color:'var(--text-2)',fontWeight:500}}>{label}</td>
                  {results.map((r,i)=><td key={i} style={{textAlign:'center',padding:'10px'}}>{r.signals?.[key]?'✅':'❌'}</td>)}
                </tr>)}
                <tr style={{borderTop:'2px solid var(--border-md)'}}>
                  <td style={{padding:'12px 16px 12px 0',fontWeight:800}}>Total score</td>
                  {results.map((r,i)=><td key={i} style={{textAlign:'center',padding:'12px'}}>
                    <span style={{fontWeight:800,fontSize:16,color:COLORS[i]}}>{r.trust_score}</span>
                  </td>)}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Compare/>);
</script>
</body>
</html>
