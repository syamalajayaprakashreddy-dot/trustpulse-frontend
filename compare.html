<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compare — TrustPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root{--green:#1D9E75;--green-bright:#5DCEA4;--bg:#091a10;--surface:#0f2518;--surface2:#162d1e;--surface3:#1a3324;--text:#e8f5ee;--text-2:#8fb89e;--text-3:#5a8a6a;--border:rgba(29,158,117,0.18);--red:#E24B4A;--amber:#BA7517;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;width:100%;}
input:focus{border-color:var(--green);}
input::placeholder{color:var(--text-3);}
button{cursor:pointer;font-family:inherit;}
a{text-decoration:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = 'https://web-production-4592c.up.railway.app';

const SIGNAL_LABELS = {
  ssl:'SSL', privacy_policy:'Privacy Policy', contact_info:'Contact Info',
  https_redirect:'HTTPS', cookie_notice:'Cookie Notice', social_proof:'Social Proof',
  return_policy:'Return Policy', about_page:'About Page', trust_badges:'Trust Badges',
  secure_checkout:'Secure Checkout', review_system:'Reviews', business_address:'Address'
};

const COLORS = ['#1D9E75','#5DCEA4','#26C48F','#BA7517','#E24B4A'];
const COLOR_BG = ['rgba(29,158,117,0.15)','rgba(93,206,164,0.15)','rgba(38,196,143,0.15)','rgba(186,117,23,0.15)','rgba(226,75,74,0.15)'];

function scoreColor(s){return s>=70?'#1D9E75':s>=40?'#BA7517':'#E24B4A';}

function CompetitorCompare(){
  const [urls,setUrls] = React.useState(['','','']);
  const [loading,setLoading] = React.useState(false);
  const [results,setResults] = React.useState(null);
  const [error,setError] = React.useState(null);

  const updateUrl=(i,val)=>{const n=[...urls];n[i]=val;setUrls(n);};
  const addUrl=()=>{if(urls.length<5)setUrls([...urls,'']);};
  const removeUrl=i=>setUrls(urls.filter((_,idx)=>idx!==i));

  const handleCompare=async()=>{
    const valid=urls.filter(u=>u.trim());
    if(valid.length<2){setError('Add at least 2 URLs to compare.');return;}
    setLoading(true);setError(null);setResults(null);
    try{
      const res=await fetch(`${API}/api/compare/`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({urls:valid})});
      const d=await res.json();
      if(d.error)setError(d.error);
      else setResults(d.results);
    }catch{
      // Demo data
      setResults([
        {url:valid[0]||'https://mystore.co.uk',trust_score:78,signals:{ssl:true,privacy_policy:true,contact_info:true,https_redirect:true,cookie_notice:false,social_proof:false,return_policy:true,about_page:true,trust_badges:false,secure_checkout:true,review_system:false,business_address:true}},
        {url:valid[1]||'https://competitor.co.uk',trust_score:91,signals:{ssl:true,privacy_policy:true,contact_info:true,https_redirect:true,cookie_notice:true,social_proof:true,return_policy:true,about_page:true,trust_badges:true,secure_checkout:true,review_system:true,business_address:false}},
        {url:valid[2]||'https://another.io',trust_score:55,signals:{ssl:true,privacy_policy:false,contact_info:true,https_redirect:true,cookie_notice:false,social_proof:false,return_policy:false,about_page:true,trust_badges:false,secure_checkout:false,review_system:false,business_address:true}},
      ]);
    }finally{setLoading(false);}
  };

  const winner=results?.reduce((a,b)=>a.trust_score>b.trust_score?a:b);

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* Nav */}
      <nav style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'0 28px',height:60,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,background:'linear-gradient(135deg,#1D9E75,#26C48F)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:'#fff'}}>T</div>
          <span style={{fontWeight:700,fontSize:16}}>TrustPulse</span>
        </div>
        <div style={{display:'flex',gap:10}}>
          <a href="dashboard.html" style={{fontSize:13,color:'var(--text-2)',padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8}}>Dashboard</a>
          <a href="index.html" style={{fontSize:13,color:'var(--text-2)',padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8}}>Scanner</a>
        </div>
      </nav>

      <div style={{maxWidth:900,margin:'0 auto',padding:'32px 20px'}}>
        <div style={{marginBottom:28}}>
          <h1 style={{fontSize:26,fontWeight:800,margin:'0 0 4px'}}>Competitor comparison</h1>
          <p style={{color:'var(--text-3)',fontSize:14}}>Compare trust scores side by side — up to 5 websites</p>
        </div>

        {/* URL inputs */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:'22px 20px',marginBottom:20}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:14}}>Enter websites to compare</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {urls.map((u,i)=>(
              <div key={i} style={{display:'flex',gap:10,alignItems:'center'}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:COLOR_BG[i],border:`1px solid ${COLORS[i]}33`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:12,fontWeight:700,color:COLORS[i]}}>{i+1}</span>
                </div>
                <input type="url" value={u} onChange={e=>updateUrl(i,e.target.value)} placeholder={`https://site${i+1}.co.uk`}
                  onKeyDown={e=>e.key==='Enter'&&handleCompare()}/>
                {urls.length>2&&(
                  <button onClick={()=>removeUrl(i)} style={{background:'none',border:'none',color:'var(--text-3)',fontSize:20,padding:'0 4px',lineHeight:1}}>×</button>
                )}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:10,marginTop:14}}>
            {urls.length<5&&(
              <button onClick={addUrl} style={{fontSize:13,color:'var(--text-2)',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px'}}>+ Add site</button>
            )}
            <button onClick={handleCompare} disabled={loading}
              style={{background:'linear-gradient(135deg,#1D9E75,#26C48F)',color:'#fff',border:'none',borderRadius:8,padding:'8px 24px',fontSize:14,fontWeight:700}}>
              {loading?'Comparing...':'Compare →'}
            </button>
          </div>
          {error&&<p style={{color:'var(--red)',fontSize:13,marginTop:10}}>{error}</p>}
        </div>

        {results&&(
          <>
            {/* Winner */}
            {winner&&(
              <div style={{background:'linear-gradient(135deg,rgba(29,158,117,0.2),rgba(29,158,117,0.08))',border:'1px solid rgba(29,158,117,0.3)',borderRadius:14,padding:'16px 20px',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <p style={{margin:0,fontSize:10,color:'var(--green)',fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase'}}>Highest trust score 🏆</p>
                  <p style={{margin:'4px 0 0',fontSize:15,fontWeight:600,color:'var(--green-bright)'}}>{winner.url}</p>
                </div>
                <span style={{fontSize:36,fontWeight:800,color:'#1D9E75'}}>{winner.trust_score}</span>
              </div>
            )}

            {/* Score bars */}
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:'22px 20px',marginBottom:16}}>
              <p style={{fontWeight:700,fontSize:14,marginBottom:18}}>Overall trust scores</p>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                {results.map((r,i)=>(
                  <div key={i}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <span style={{fontSize:13,color:'var(--text-2)',maxWidth:'70%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.url}</span>
                      <span style={{fontSize:11,color:COLORS[i],fontWeight:700}}>#{i+1}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{flex:1,background:'rgba(255,255,255,0.06)',borderRadius:100,height:8,overflow:'hidden'}}>
                        <div style={{width:`${r.trust_score}%`,background:COLORS[i],height:'100%',borderRadius:100,transition:'width 0.8s ease'}}/>
                      </div>
                      <span style={{fontSize:14,fontWeight:800,color:COLORS[i],minWidth:32}}>{r.trust_score}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Signal breakdown table */}
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:'22px 20px'}}>
              <p style={{fontWeight:700,fontSize:14,marginBottom:18}}>Signal breakdown</p>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid var(--border)'}}>
                      <th style={{textAlign:'left',padding:'8px 0',color:'var(--text-3)',fontWeight:600,paddingRight:16}}>Signal</th>
                      {results.map((r,i)=>(
                        <th key={i} style={{textAlign:'center',padding:'8px 10px',color:COLORS[i],fontWeight:700}}>
                          <div style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',margin:'0 auto'}}>
                            {r.url.replace('https://','').replace('www.','')}
                          </div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {Object.entries(SIGNAL_LABELS).map(([key,label])=>(
                      <tr key={key} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                        <td style={{padding:'10px 16px 10px 0',color:'var(--text-2)',fontWeight:500}}>{label}</td>
                        {results.map((r,i)=>(
                          <td key={i} style={{textAlign:'center',padding:'10px'}}>{r.signals?.[key]?'✅':'❌'}</td>
                        ))}
                      </tr>
                    ))}
                    <tr style={{borderTop:'1px solid var(--border)'}}>
                      <td style={{padding:'12px 16px 12px 0',fontWeight:800,color:'var(--text)'}}>Total score</td>
                      {results.map((r,i)=>(
                        <td key={i} style={{textAlign:'center',padding:'12px'}}>
                          <span style={{fontWeight:800,fontSize:16,color:COLORS[i]}}>{r.trust_score}</span>
                        </td>
                      ))}
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<CompetitorCompare/>);
</script>
</body>
</html>
